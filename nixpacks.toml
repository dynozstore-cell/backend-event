[phases.setup]
nixPkgs = [
  "php81",
  "php81Packages.composer",
  "php81Extensions.mbstring",
  "php81Extensions.openssl",
  "php81Extensions.pdo",
  "php81Extensions.tokenizer",
  "php81Extensions.xml",
  "php81Extensions.curl",
  "php81Extensions.fileinfo"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --ignore-platform-reqs"
]

# ⛔ HAPUS / KOSONGKAN BUILD NODE
[phases.build]
cmds = [
  "echo 'skip frontend build'"
]

[start]
cmd = "php artisan config:clear && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"